<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smiloo | 카톡 플러스친구</title>
  <meta name="description" content="Smiloo 랜딩페이지. 카카오 플러스친구를 추가하고 출시 소식을 가장 먼저 받아보세요.">
  <meta name="format-detection" content="telephone=no">
  <meta name="theme-color" content="#fbef1d">
  <style>
    :root {
      --page-width: 767px;
      --blue: #2039db;
      --yellow: #fbef1d;
      --shadow: 0 18px 44px rgba(17, 17, 17, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top, rgba(251, 239, 29, 0.24), transparent 32%),
        linear-gradient(180deg, #fffef5 0%, #fff 26%, #fff9c4 100%);
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: #111;
    }

    .skip-link {
      position: absolute;
      left: 14px;
      top: 14px;
      z-index: 30;
      padding: 10px 14px;
      border-radius: 999px;
      background: var(--blue);
      color: #fff;
      text-decoration: none;
      transform: translateY(-160%);
    }

    .skip-link:focus {
      transform: translateY(0);
    }

    .page {
      width: min(100%, var(--page-width));
      margin: 0 auto;
    }

    .landing-frame {
      position: relative;
      width: 100%;
    }

    .landing-image {
      display: block;
      width: 100%;
      height: auto;
    }

    .image-cta {
      position: absolute;
      left: 15.38%;
      top: 95.72%;
      width: 72.10%;
      height: 2.12%;
      border-radius: 2px;
      background: transparent;
    }

    .image-cta:focus-visible {
      outline: 4px solid #111;
      outline-offset: 3px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .sticky-cta {
      position: fixed;
      left: 50%;
      bottom: 14px;
      z-index: 25;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: min(calc(100% - 24px), 420px);
      min-height: 62px;
      padding: 14px 24px;
      border: 2px solid #111;
      border-radius: 20px;
      background: var(--blue);
      color: #fff;
      text-decoration: none;
      font-size: 1.5rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.01em;
      box-shadow: 6px 6px 0 rgba(17, 17, 17, 0.28);
      transform: translate(-50%, 120%);
      opacity: 0;
      pointer-events: none;
      transition: transform 200ms ease, opacity 200ms ease;
      white-space: nowrap;
    }

    .sticky-cta.is-visible {
      transform: translate(-50%, 0);
      opacity: 1;
      pointer-events: auto;
    }

    .sticky-cta:focus-visible {
      outline: 4px solid #111;
      outline-offset: 3px;
    }

    @media (max-width: 480px) {
      .sticky-cta {
        min-height: 56px;
        padding: 12px 20px;
        font-size: 1.28rem;
      }
    }

    @media (min-width: 900px) {
      body {
        padding: 24px 0 110px;
      }

      .page {
        border-radius: 18px;
        overflow: hidden;
        box-shadow: var(--shadow);
      }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main-content">본문 바로가기</a>

  <main id="main-content" class="page">
    <section class="landing" aria-label="Smiloo 랜딩페이지">
      <div class="landing-frame">
        <img
          class="landing-image"
          src="landing.png"
          alt="Smiloo 랜딩페이지 디자인"
          width="767"
          height="5322"
          fetchpriority="high"
          decoding="async">

        <a
          class="image-cta js-kakao-link"
          href="https://pf.kakao.com/_YOUR_ID"
          target="_blank"
          rel="noreferrer"
          aria-label="카카오 플러스친구 추가하기">
          <span class="sr-only">카카오 플러스친구 추가하기</span>
        </a>
      </div>
    </section>
  </main>

  <a
    class="sticky-cta js-kakao-link"
    href="https://pf.kakao.com/_YOUR_ID"
    target="_blank"
    rel="noreferrer">
    카톡 플친하기
  </a>

  <script>
    const KAKAO_PLUS_URL = "https://pf.kakao.com/_YOUR_ID";

    const links = document.querySelectorAll(".js-kakao-link");
    const stickyButton = document.querySelector(".sticky-cta");
    const imageCta = document.querySelector(".image-cta");

    links.forEach((link) => {
      link.href = KAKAO_PLUS_URL;
    });

    if (stickyButton) {
      let footerButtonVisible = false;

      const updateStickyButton = () => {
        const shouldShow = window.scrollY > 220 && !footerButtonVisible;
        stickyButton.classList.toggle("is-visible", shouldShow);
      };

      if ("IntersectionObserver" in window && imageCta) {
        const observer = new IntersectionObserver(
          ([entry]) => {
            footerButtonVisible = entry.isIntersecting;
            updateStickyButton();
          },
          {
            threshold: 0.15,
          }
        );

        observer.observe(imageCta);
      }

      updateStickyButton();
      window.addEventListener("scroll", updateStickyButton, { passive: true });
      window.addEventListener("resize", updateStickyButton);
    }
  </script>
</body>
</html>
