<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smiloo | 카톡 플러스친구</title>
  <meta name="description" content="Smiloo 랜딩페이지. 카카오 플러스친구를 추가하고 출시 소식을 가장 먼저 받아보세요.">
  <meta name="format-detection" content="telephone=no">
  <meta name="theme-color" content="#fbef1d">
  <style>
    :root {
      --page-width: 767px;
      --blue: #2039db;
      --yellow: #fbef1d;
      --shadow: 0 18px 44px rgba(17, 17, 17, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top, rgba(251, 239, 29, 0.24), transparent 32%),
        linear-gradient(180deg, #fffef5 0%, #fff 26%, #fff9c4 100%);
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: #111;
    }

    .skip-link {
      position: absolute;
      left: 14px;
      top: 14px;
      z-index: 30;
      padding: 10px 14px;
      border-radius: 999px;
      background: var(--blue);
      color: #fff;
      text-decoration: none;
      transform: translateY(-160%);
    }

    .skip-link:focus {
      transform: translateY(0);
    }

    .page {
      width: min(100%, var(--page-width));
      margin: 0 auto;
    }

    .landing-frame {
      position: relative;
      width: 100%;
    }

    .landing-image {
      display: block;
      width: 100%;
      height: auto;
    }

    .image-cta {
      position: absolute;
      left: 15.38%;
      top: 95.72%;
      width: 72.10%;
      height: 2.12%;
      border-radius: 2px;
      background: transparent;
    }

    .image-cta:focus-visible {
      outline: 4px solid #111;
      outline-offset: 3px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .sticky-cta {
      position: fixed;
      left: 50%;
      bottom: 14px;
      z-index: 25;
      display: block;
      width: min(calc(100% - 20px), 205px);
      transform: translate(-50%, 120%);
      opacity: 0;
      pointer-events: none;
      transition: transform 200ms ease, opacity 200ms ease;
    }

    .sticky-cta.is-visible {
      transform: translate(-50%, 0);
      opacity: 1;
      pointer-events: auto;
    }

    .sticky-cta img {
      display: block;
      width: 100%;
      height: auto;
    }

    .sticky-cta:focus-visible {
      outline: 4px solid #111;
      outline-offset: 3px;
    }

    @media (max-width: 480px) {
      .sticky-cta {
        width: min(calc(100% - 20px), 205px);
      }
    }

    @media (min-width: 900px) {
      body {
        padding: 24px 0 110px;
      }

      .page {
        border-radius: 18px;
        overflow: hidden;
        box-shadow: var(--shadow);
      }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main-content">본문 바로가기</a>

  <main id="main-content" class="page">
    <section class="landing" aria-label="Smiloo 랜딩페이지">
      <div class="landing-frame">
        <img
          class="landing-image"
          src="landing.png"
          alt="Smiloo 랜딩페이지 디자인"
          width="767"
          height="5322"
          fetchpriority="high"
          decoding="async">

        <a
          class="image-cta js-kakao-link"
          href="https://pf.kakao.com/_YOUR_ID"
          target="_blank"
          rel="noreferrer"
          aria-label="카카오 플러스친구 추가하기">
          <span class="sr-only">카카오 플러스친구 추가하기</span>
        </a>
      </div>
    </section>
  </main>

  <a
    class="sticky-cta js-kakao-link"
    href="https://pf.kakao.com/_YOUR_ID"
    target="_blank"
    rel="noreferrer">
    <img src="sticky-button.png" alt="카톡 플러스친구 추가하기">
  </a>

  <script>
    const KAKAO_PLUS_URL = "http://pf.kakao.com/_uyIEX";

    const links = document.querySelectorAll(".js-kakao-link");
    const stickyButton = document.querySelector(".sticky-cta");
    const imageCta = document.querySelector(".image-cta");
    const stickyImage = stickyButton ? stickyButton.querySelector("img") : null;

    const makeOuterWhiteTransparent = (img) => {
      const canvas = document.createElement("canvas");
      const width = img.naturalWidth;
      const height = img.naturalHeight;

      if (!width || !height) {
        return;
      }

      canvas.width = width;
      canvas.height = height;

      const context = canvas.getContext("2d", { willReadFrequently: true });
      context.drawImage(img, 0, 0);

      const imageData = context.getImageData(0, 0, width, height);
      const { data } = imageData;
      const visited = new Uint8Array(width * height);
      const queue = new Uint32Array(width * height);
      let head = 0;
      let tail = 0;

      const isNearWhite = (offset) =>
        data[offset + 3] > 0 &&
        data[offset] >= 235 &&
        data[offset + 1] >= 235 &&
        data[offset + 2] >= 235;

      const enqueue = (x, y) => {
        if (x < 0 || x >= width || y < 0 || y >= height) {
          return;
        }

        const index = y * width + x;
        if (visited[index]) {
          return;
        }

        const offset = index * 4;
        if (!isNearWhite(offset)) {
          return;
        }

        visited[index] = 1;
        queue[tail++] = index;
      };

      for (let x = 0; x < width; x += 1) {
        enqueue(x, 0);
        enqueue(x, height - 1);
      }

      for (let y = 0; y < height; y += 1) {
        enqueue(0, y);
        enqueue(width - 1, y);
      }

      while (head < tail) {
        const index = queue[head++];
        const x = index % width;
        const y = (index - x) / width;
        const offset = index * 4;

        data[offset + 3] = 0;

        enqueue(x + 1, y);
        enqueue(x - 1, y);
        enqueue(x, y + 1);
        enqueue(x, y - 1);
      }

      context.putImageData(imageData, 0, 0);
      img.src = canvas.toDataURL("image/png");
    };

    links.forEach((link) => {
      link.href = KAKAO_PLUS_URL;
    });

    if (stickyImage) {
      if (stickyImage.complete) {
        makeOuterWhiteTransparent(stickyImage);
      } else {
        stickyImage.addEventListener("load", () => makeOuterWhiteTransparent(stickyImage), {
          once: true,
        });
      }
    }

    if (stickyButton) {
      let footerButtonVisible = false;

      const updateStickyButton = () => {
        const shouldShow = window.scrollY > 220 && !footerButtonVisible;
        stickyButton.classList.toggle("is-visible", shouldShow);
      };

      if ("IntersectionObserver" in window && imageCta) {
        const observer = new IntersectionObserver(
          ([entry]) => {
            footerButtonVisible = entry.isIntersecting;
            updateStickyButton();
          },
          {
            threshold: 0.15,
          }
        );

        observer.observe(imageCta);
      }

      updateStickyButton();
      window.addEventListener("scroll", updateStickyButton, { passive: true });
      window.addEventListener("resize", updateStickyButton);
    }
  </script>
</body>
</html>
